config_version: 3

server:
  host: "0.0.0.0"
  port: 8080
  proxy: ""
  asset_http_version: "auto" # auto | http1; http1 can help with CDN/proxy compatibility issues
  auth:
    enabled: true
    user_agent_prefix: "HarukiInternal/"
    bearer_token: "change-me"
  tls:
    enabled: false
    cert_file: ""
    key_file: ""

logging:
  level: "INFO"
  format: "pretty"
  file: ""
  access:
    enabled: true
    format: "[${time}] ${status} - ${method} ${path} ${latency}\n"
    file: "./logs/access.log"

execution:
  timeout_seconds: 300
  allow_cancel: true       # legacy; poller currently doesn't cancel mid-flight
  batch_save_size: 50      # legacy; not used by the new HIP-based pipeline
  retry:
    attempts: 4
    initial_backoff_ms: 1000
    max_backoff_ms: 4000

# =============================================================================
# Poller: replaces the removed v2 job HTTP API. Every interval_seconds it
# pulls current_version.json for each enabled region and, only if the
# version differs from the persisted watermark, kicks off the full
# execute + HIP upload pipeline for that region.
# =============================================================================
poller:
  enabled: true
  interval_seconds: 60
  watermark_file: "./Data/poller/watermarks.json"
  last_info_dir: "./Data/poller/last_info"
  max_concurrent_regions: 5

# =============================================================================
# HIP/1 client: talks to the pjsk.moe dedup gateway. See docs/hip.md for the
# protocol spec. Disable if you only want to run local exports.
# =============================================================================
hip:
  enabled: true
  endpoint: "127.0.0.1:7420"
  bearer_token: "${env:HARUKI_HIP_TOKEN}"
  tls:
    enabled: false
    ca_file: ""
  handshake_timeout_ms: 5000
  request_timeout_ms: 30000
  max_frame_bytes: 16777216
  chunk_size_bytes: 1048576
  max_in_flight_uploads: 8
  check_batch_size: 512
  heartbeat_interval_seconds: 30
  # Streaming commit: every N successfully-uploaded bundles (or M total bytes,
  # whichever hits first) the client sends a COMMIT, opens a fresh session for
  # the rest, and flushes the layer1 snapshot on disk. This keeps memory bounded,
  # makes uploaded data visible via the gateway as soon as each batch commits,
  # and — critically — lets a mid-poll crash resume from the last commit instead
  # of re-processing the entire region.
  # Set either to 0 to disable that trigger. Setting both to 0 restores the
  # legacy "one COMMIT at the end of the region" behaviour.
  commit_batch_bundles: 500
  commit_batch_bytes: 536870912   # 512 MiB

backends:
  media:
    backend: "ffi" # ffi preferred; auto/cli keep Windows or FFI-unavailable fallback
    ffmpeg_path: "ffmpeg"
  image:
    backend: "rust"
    png_compression: "fast" # fast | default | best
    webp_lossless: true
    jpeg_quality: 95
  asset_studio:
    library_path: ""
    mode: "worker_pool" # worker_pool for production isolation; direct for local FFI throughput benchmarks
    worker_path: ""
    process_concurrency: 0 # 0 = auto: CPU budget, or CPU-count oversubscription when CPU throttle is enabled
    worker_max_calls: 256 # 0 disables recycling
    read_batch_size: 64 # context_read_objects chunk size
    image_format: "raw_rgba" # AssetStudioFFI image reads only support raw_rgba
    read_kinds: # optional per AssetStudio type selector
      Texture2D: image
      Sprite: image
      Mesh: obj
      TextAsset: text_bytes
      MonoBehaviour: typetree_json
      AudioClip: audio
      Animator: pjsk_model_package
      AnimationClip: pjsk_animation_clip_decoded
      all: typetree_json

resources:
  cpu:
    budget_auto: true
    budget_ratio: 1.0
    reserved: 0
    throttle:
      enabled: false # when true, gate CPU-heavy work by this process tree's sampled CPU budget
      sample_ms: 250
  memory:
    max_in_flight_bundle_bytes: 0 # 0 disables the soft memory guard; try 4294967296 on small Linux hosts

concurrency:
  auto_tune: false # when true, values below are throughput-oriented caps scaled to CPU count
  download: 32
  upload: 4
  post_process: 16 # 0 = use max(audio_encode, video_encode); raise for image/typetree-heavy full exports
  acb: 12
  usm: 6
  hca: 16
  media_encode: 12 # legacy aggregate FFmpeg/rsmpeg cap; prefer audio_encode/video_encode
  audio_encode: 12 # HCA -> wav/flac/mp3 encode limit
  video_encode: 4 # USM/M2V -> mp4 encode limit; keep lower to avoid x264 memory spikes
  images: 12

storage:
  providers: []
  # Example OpenDAL S3-compatible provider:
  # providers:
  #   - name: assets
  #     scheme: s3
  #     root: "assets/{region}"
  #     public_base_url: "https://cdn.example.com/assets/{region}"
  #     public_read: false # S3 only; true uploads objects with default_acl=public-read
  #     options:
  #       bucket: "sekai-{region}-assets"
  #       endpoint: "https://s3.example.com"
  #       region: "auto"
  #       access_key_id: "${env:HARUKI_STORAGE_ACCESS_KEY_ID}"
  #       secret_access_key: "${env:HARUKI_STORAGE_SECRET_ACCESS_KEY}"

git_sync:
  chart_hashes:
    enabled: false
    repository_dir: "./sekai-chart-hash"
    username: "none"
    email: "none"
    password: "change-me"
    sign_commits: false
    signing_format: "gpg" # gpg | ssh
    signing_key: "" # GPG key id, SSH public/private key path, or SSH public key
    signing_program: "" # optional: gpg.program for GPG or gpg.ssh.program for SSH

regions:
  jp:
    enabled: false
    provider:
      kind: colorful_palette
      current_version_url: "https://raw.githubusercontent.com/Team-Haruki/haruki-sekai-master/main/versions/current_version.json"
      game_version_url_template: "https://game-version.sekai.colorfulpalette.org/{app_version}/{app_hash}"
      asset_info_url_template: ""
      asset_bundle_url_template: ""
      profile: "production"
      profile_hashes: {}
      required_cookies: true
    crypto:
      aes_key_hex: ""
      aes_iv_hex: ""
    runtime:
      unity_version: "2022.3.21f1"
    paths:
      asset_save_dir: "./Data/jp-assets"
      downloaded_asset_record_file: "./Data/jp-assets/downloaded_assets.json"
    filters:
      start_app:
        - "bonds_honor"
        - "honor"
        - "thumbnail"
        - "character"
        - "music"
      on_demand:
        - "event"
        - "gacha"
        - "music"
      skip: []
      priority:
        - "^character/member.*"
        - "^event/.*"
        - "^gacha/.*"
        - ".*"
    export:
      by_category: false
      asset_studio_types:
        - monoBehaviour
        - textAsset
        - tex2d
        - tex2dArray
        - sprite
        - audio
        - animator
        - AnimationClip
      usm:
        export: true
        decode: true
      acb:
        export: true
        decode: true
      hca:
        decode: true
      images:
        formats: ["png"] # png | jpg | webp
      video:
        formats: ["mp4"] # m2v | mp4
        direct_mp4: true
      audio:
        formats: ["mp3"] # wav | flac | mp3
      raw_bundles:
        output_dir: "./Data/jp-assets/AssetBundles"
        include:
          - "^live_pv/model/characterv2/body/"
          - "^live_pv/model/characterv2/face/"
          - "^live_pv/model/characterv2/head_optional/"
          - "^live_pv/model/characterv2/color_variation/body/"
          - "^live_pv/model/characterv2/color_variation/face/"
          - "^live_pv/model/characterv2/color_variation/head_optional/"
          - "^character/motion/costume_setting/"
        exclude: []
      mesh:
        export_obj: false
        path_patterns:
          - "^mysekai/custom_fixture_attach(?:/|$)"
          - "^mysekai/fixture(?:/|$)"
          - "^mysekai/site/field/my_room_asset/skin(?:/|$)"
      haruki_3d:
        enabled: false
        exporter_path: "/app/haruki-3d/exporter/Haruki-3D-Exporter"
        master_dir: "/app/data/haruki-sekai-master/master"
        work_dir: "/app/data/3d-work"
        manifest_file: "/app/data/3d-output/haruki-3d-export-manifest.json"
        output_dir: "/app/data/3d-output"
        process_concurrency: 0 # 0 = exporter auto CPU count; set a fixed value such as 16 for bounded full 3D export
        role_character3d_ids:
          - 5
        include:
          - "^live_pv/model/characterv2/body/"
          - "^live_pv/model/characterv2/face/"
          - "^live_pv/model/characterv2/head_optional/"
          - "^live_pv/model/characterv2/color_variation/body/"
          - "^live_pv/model/characterv2/color_variation/face/"
          - "^live_pv/model/characterv2/color_variation/head_optional/"
          - "^character/motion/costume_setting/"
        exclude: []
        cleanup_work_dir_after_success: true
        cleanup_work_dir_after_failure: true
    # Note: regions.*.upload is legacy (S3 via OpenDAL). The HIP client is
    # the primary upload path now — see the top-level `hip:` block. Leaving
    # this section out (or `enabled: false`) is the recommended default.

  cn:
    enabled: false
    provider:
      kind: nuverse
      current_version_url: "https://raw.githubusercontent.com/Team-Haruki/haruki-sekai-sc-master/main/versions/current_version.json"
      asset_version_url: "https://lf3-mkcncdn-tos.dailygn.com/obj/rt-game-lf/gdl_app_5236/Mainland/{app_version}/Release/cn_online/ios/version"
      app_version: "5.2.0"
      asset_info_url_template: "https://lf3-mkcncdn-tos.dailygn.com/obj/sf-game-lf/gdl_app_5236/AssetBundle/{app_version}/Release/cn_online/ios{asset_version}/AssetBundleInfoNew.json"
      asset_bundle_url_template: "https://lf3-mkcncdn-tos.dailygn.com/obj/sf-game-lf/gdl_app_5236/AssetBundle/{app_version}/Release/cn_online/{bundle_path}"
      required_cookies: false
    crypto:
      aes_key_hex: ""
      aes_iv_hex: ""
    runtime:
      unity_version: "2022.3.21f1"
    paths:
      asset_save_dir: "./Data/cn-assets"
      downloaded_asset_record_file: "./Data/cn-assets/downloaded_assets.json"
    filters:
      start_app: []
      on_demand:
        - "music/long"
      skip: []
      priority:
        - "^music/.*"
        - ".*"
    export:
      by_category: false
      usm:
        export: true
        decode: true
      acb:
        export: true
        decode: true
      hca:
        decode: true
      images:
        formats: ["png"] # png | jpg | webp
      video:
        formats: ["mp4"] # m2v | mp4
        direct_mp4: false
      audio:
        formats: ["mp3"] # wav | flac | mp3
    # See jp region above regarding the removed `upload:` section.
